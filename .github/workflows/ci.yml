name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze (very_good_analysis)
        run: flutter analyze
      - name: Run tests
        run: flutter test

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true
      - name: Install dependencies
        run: flutter pub get
      # Debug macOS builds sign ad-hoc ("Sign to Run Locally") and need no
      # Apple Developer team, so this compiles the native CGEventTap + plugins
      # without secrets.
      - name: Build macOS (debug)
        run: flutter build macos --debug

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Flutter's Linux toolchain + the native input-lock deps (X11 grab,
      # xkbcommon, Wayland client + protocols + wayland-scanner).
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libx11-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols libwayland-bin \
            libkeybinder-3.0-dev libayatana-appindicator3-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build Linux (debug)
        run: flutter build linux --debug

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build Windows (debug)
        run: flutter build windows --debug
